[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
# High runs = cheaper runtime gas at the cost of deploy size — right trade-off
# for a contract deployed once and called on every arb attempt.
optimizer_runs = 10000
# Cancun enables EIP-1153 transient storage (ReentrancyGuardTransient).
# Base has been on Cancun since March 2024.
evm_version = "cancun"

[invariant]
runs  = 256   # number of fuzzing campaigns
depth = 50    # random calls per campaign

[rpc_endpoints]
base = "${BASE_RPC_URL}"
ethereum = "${ETH_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }
ethereum = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}" }
